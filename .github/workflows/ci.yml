name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Activate Yarn 4
        run: corepack enable && corepack prepare yarn@4.13.0 --activate
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn test:lite

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Activate Yarn 4
        run: corepack enable && corepack prepare yarn@4.13.0 --activate
      - run: yarn install --immutable
      - run: yarn lint
      # Server tests need a live Supabase/Postgres and share one DB
      # (no test isolation yet), so they stay a local-only gate.
